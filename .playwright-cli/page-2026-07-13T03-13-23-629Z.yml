    - generic [ref=e254]:
      - heading "section/Introduction/Frequently-Asked-Questions Frequently Asked Questions" [level=2] [ref=e257]:
        - link "section/Introduction/Frequently-Asked-Questions" [ref=e258] [cursor=pointer]:
          - /url: "#section/Introduction/Frequently-Asked-Questions"
        - text: Frequently Asked Questions
      - generic [ref=e260]:
        - heading "1) What are the date and time formats I should use when using the API?" [level=4] [ref=e261]
        - paragraph [ref=e262]:
          - text: Time Doctor API supports
          - link "ISO 8601 date and time format" [ref=e263] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/ISO_8601
          - text: i.e.
          - code [ref=e264]: YYYY-MM-DDT00:00:00Z
          - text: (Z refers to UTC timezone)
        - heading "2) How can I get the data in a different timezone than UTC?" [level=4] [ref=e265]
        - paragraph [ref=e266]:
          - text: Having timezone offset can result in performance issues for reasons such as
          - link "daylight savings changes" [ref=e267] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/Daylight_saving_time
          - text: ". Time Doctor stores and returns data only in the UTC timezone. You will need to convert the local time into UTC timezone before you pass it as a query parameter in the API call. For example:"
          - code [ref=e268]: Jul 2nd, 2021 06:36 AM UTC+8 = Jul 1st, 2021 10:36 PM UTC
          - text: time.
        - paragraph [ref=e269]:
          - strong [ref=e270]: "Related Operations:"
        - list [ref=e271]:
          - listitem [ref=e272]:
            - link "Get Company Timezone" [ref=e273] [cursor=pointer]:
              - /url: "#operation/getCompanyTimezones"
            - text: "- Retrieve company users' timezones information"
        - heading "3) What date range should I use when running a report for the same day?" [level=4] [ref=e274]
        - paragraph [ref=e275]: "Time Doctor API supports ISO date and time format. If you are running the report for the same day, you'll need to provide the date range as in example below:"
        - paragraph [ref=e276]:
          - code [ref=e277]: from=2021-07-02T00:00:00Z&to=2021-07-03T00:00:00Z
          - text: for Jul 2, 2021 UTC.
        - paragraph [ref=e278]:
          - strong [ref=e279]: "Related Operations:"
        - list [ref=e280]:
          - listitem [ref=e281]:
            - link "Get Activity Worklog" [ref=e282] [cursor=pointer]:
              - /url: "#operation/getActivityWorklog"
            - text: "- Retrieve detailed work activity"
          - listitem [ref=e283]:
            - link "Get Stats" [ref=e284] [cursor=pointer]:
              - /url: "#operation/getStats_1_1_total"
            - text: "- Aggregated statistics"
          - listitem [ref=e285]:
            - link "Get Category Stats" [ref=e286] [cursor=pointer]:
              - /url: "#operation/getStats_1_1_category"
            - text: "- Overall activity statistics for applications and websites"
        - heading "4) What is the reason for blank titles for web & app activity records in the API result?" [level=4] [ref=e287]
        - paragraph [ref=e288]: This could be due to an issue with the specific application permissions that the data wasn't captured. It could also be that the web & app tracking was disabled before it was enabled, so the blank titles are from the time when the setting was disabled.
        - paragraph [ref=e289]:
          - strong [ref=e290]: "Related Operations:"
        - list [ref=e291]:
          - listitem [ref=e292]:
            - link "Get Stats" [ref=e293] [cursor=pointer]:
              - /url: "#operation/getStats_1_1_total"
            - text: "- Aggregated statistics"
          - listitem [ref=e294]:
            - link "Get Category Stats" [ref=e295] [cursor=pointer]:
              - /url: "#operation/getStats_1_1_category"
            - text: "- Overall activity statistics for applications and websites"
        - heading "5) What is meant by \"Tags\" in the Time Doctor API documentation?" [level=4] [ref=e296]
        - paragraph [ref=e297]:
          - text: Tags refer to
          - strong [ref=e298]: Groups
          - text: in Time Doctor - organizational units for managing users.
        - paragraph [ref=e299]:
          - strong [ref=e300]: "Related Operations:"
        - list [ref=e301]:
          - listitem [ref=e302]:
            - link "Get Groups" [ref=e303] [cursor=pointer]:
              - /url: "#operation/getTags"
            - text: "- List all groups in company"
          - listitem [ref=e304]:
            - link "Create Group" [ref=e305] [cursor=pointer]:
              - /url: "#operation/createTag"
            - text: "- Add new group"
          - listitem [ref=e306]:
            - link "Get Group Details" [ref=e307] [cursor=pointer]:
              - /url: "#operation/getTag"
            - text: "- View specific group information"
          - listitem [ref=e308]:
            - link "Add User to Group" [ref=e309] [cursor=pointer]:
              - /url: "#operation/addUserTag"
            - text: "- Assign users to groups"
        - heading "6) What is meant by \"Files\" in the Time Doctor API documentation?" [level=4] [ref=e310]
        - paragraph [ref=e311]:
          - text: Files refer to the
          - strong [ref=e312]: screencasts
          - text: (screenshots and screen videos) in Time Doctor.
        - paragraph [ref=e313]:
          - strong [ref=e314]: "Related Operations:"
        - list [ref=e315]:
          - listitem [ref=e316]:
            - link "Get Files" [ref=e317] [cursor=pointer]:
              - /url: "#operation/getFiles"
            - text: "- List user screenshots/videos"
          - listitem [ref=e318]:
            - link "Get Signed URL" [ref=e319] [cursor=pointer]:
              - /url: "#operation/getFileSignedUrl"
            - text: "- Get download link for specific file"
          - listitem [ref=e320]:
            - link "Delete File" [ref=e321] [cursor=pointer]:
              - /url: "#operation/deleteFile"
            - text: "- Remove screenshot/video"
        - heading "7) What is meant by \"Categories\" in the Time Doctor API documentation?" [level=4] [ref=e322]
        - paragraph [ref=e323]:
          - text: Categories refer to the
          - strong [ref=e324]: productivity ratings
          - text: in Time Doctor - classifications of applications and websites as productive, unproductive, neutral, or unrated.
        - paragraph [ref=e325]:
          - strong [ref=e326]: "Related Operations:"
        - list [ref=e327]:
          - listitem [ref=e328]:
            - link "Get Categories" [ref=e329] [cursor=pointer]:
              - /url: "#operation/getCategories"
            - text: "- List all productivity categories"
          - listitem [ref=e330]:
            - link "Set Category" [ref=e331] [cursor=pointer]:
              - /url: "#operation/setCategory"
            - text: "- Update productivity rating"
          - listitem [ref=e332]:
            - link "Get Unrated Categories" [ref=e333] [cursor=pointer]:
              - /url: "#operation/getCategoriesUnratedCount"
            - text: "- Find uncategorized items"
        - heading "8) Why is the Disconnectivity report API not showing any data?" [level=4] [ref=e334]
        - paragraph [ref=e335]:
          - text: The Disconnectivity report works with Time Doctor application v3.4.8 and above. Please make sure the users are using this app version or the newest. Send an email to
          - code [ref=e336]: support@timedoctor.com
          - text: in case you still experience any issues after upgrading the application version.
        - paragraph [ref=e337]:
          - strong [ref=e338]: "Related Operations:"
        - list [ref=e339]:
          - listitem [ref=e340]:
            - link "Get Disconnectivity" [ref=e341] [cursor=pointer]:
              - /url: "#operation/getDisconnectivity"
            - text: "- Retrieve disconnection periods"
        - heading "9) Does the API provide or support webhooks?" [level=4] [ref=e342]
        - paragraph [ref=e343]:
          - text: We don't currently have
          - link "webhooks" [ref=e344] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/Webhook
          - text: . You may create custom scripts to call the API endpoints. Feel free to email
          - code [ref=e345]: support@timedoctor.com
          - text: in case you have any questions.
        - paragraph [ref=e346]:
          - strong [ref=e347]: "Alternative Approaches:"
        - list [ref=e348]:
          - listitem [ref=e349]:
            - link "Bulk Operations" [ref=e350] [cursor=pointer]:
