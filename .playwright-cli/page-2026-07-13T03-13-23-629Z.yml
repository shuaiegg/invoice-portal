      - paragraph [ref=e163]:
        - text: Time Doctor provides an API that can be used to retrieve most of its reports and resources. Please reach out to
        - code [ref=e164]: support@timedoctor.com
        - text: if you need any help with the API or have any suggestions regarding it.
    - generic [ref=e165]:
      - heading "section/Introduction/RESTful-APIs RESTful APIs" [level=2] [ref=e168]:
        - link "section/Introduction/RESTful-APIs" [ref=e169] [cursor=pointer]:
          - /url: "#section/Introduction/RESTful-APIs"
        - text: RESTful APIs
      - generic [ref=e171]:
        - paragraph [ref=e172]:
          - text: The APIs use
          - link "REST principles" [ref=e173] [cursor=pointer]:
            - /url: https://restfulapi.net/
          - text: to create a standard and familiar interface. REST, which stands for REpresentational State Transformation, defines a set of principles for organizing web services using the
          - link "HTTP protocol" [ref=e174] [cursor=pointer]:
            - /url: https://developer.mozilla.org/en-US/docs/Web/HTTP/Overview
          - text: "and a specific set of HTTP verbs or methods. The methods used in the Time Doctor API are:"
        - list [ref=e175]:
          - listitem [ref=e176]:
            - strong [ref=e177]: POST
            - text: ": Create a resource"
          - listitem [ref=e178]:
            - strong [ref=e179]: GET
            - text: ": Read a resource"
          - listitem [ref=e180]:
            - strong [ref=e181]: PUT
            - text: ": Update a resource"
          - listitem [ref=e182]:
            - strong [ref=e183]: DELETE
            - text: ": Delete a resource"
        - paragraph [ref=e184]:
          - text: Together these are often known as
          - link "CRUD operations" [ref=e185] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/Create,_read,_update_and_delete
          - text: – Create, Read, Update, and Delete.
    - generic [ref=e186]:
      - heading "section/Introduction/HTTPS HTTPS" [level=2] [ref=e189]:
        - link "section/Introduction/HTTPS" [ref=e190] [cursor=pointer]:
          - /url: "#section/Introduction/HTTPS"
        - text: HTTPS
      - generic [ref=e192]:
        - paragraph [ref=e193]:
          - text: Time doctor API calls use the
          - link "HTTPS protocol" [ref=e194] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/HTTPS
          - text: ", the secure form of HTTP. All calls for version 1.0 begin with the prefix:"
        - paragraph [ref=e195]:
          - link "https://timedoctor.redoc.ly/" [ref=e196] [cursor=pointer]:
            - /url: https://timedoctor.redoc.ly/
        - paragraph [ref=e197]: "The request header for all API calls must include the following parameters:"
        - list [ref=e198]:
          - listitem [ref=e199]:
            - code [ref=e200]: "\"Accept: application/json\""
          - listitem [ref=e201]:
            - code [ref=e202]: "\"Content-Type: application/json\""
            - text: (for requests sending the body)
        - paragraph [ref=e203]:
          - text: If the request body is not empty, it consists of a sequence of parameters given in
          - link "JSON format" [ref=e204] [cursor=pointer]:
            - /url: https://www.json.org/
          - text: . If a response body is returned, its content is given in JSON format as well.
    - generic [ref=e205]:
      - heading "section/Introduction/Auth-TokenKey Auth Token/Key" [level=2] [ref=e208]:
        - link "section/Introduction/Auth-TokenKey" [ref=e209] [cursor=pointer]:
          - /url: "#section/Introduction/Auth-TokenKey"
        - text: Auth Token/Key
      - generic [ref=e211]:
        - paragraph [ref=e212]:
          - text: "Note: Every call to a Time Doctor API must be authenticated using a \""
          - link "bearer token" [ref=e213] [cursor=pointer]:
            - /url: https://oauth.net/2/bearer-tokens/
          - text: "\" based on"
          - link "OAuth 2.0" [ref=e214] [cursor=pointer]:
            - /url: https://oauth.net/2/
          - text: ". Tokens are generated by the following APIs:"
        - list [ref=e215]:
          - listitem [ref=e216]:
            - link "Login" [ref=e217] [cursor=pointer]:
              - /url: "#operation/login"
            - text: "- Authenticate with email and password"
          - listitem [ref=e218]:
            - link "Register" [ref=e219] [cursor=pointer]:
              - /url: "#operation/register"
            - text: "- Create new account and get token"
        - paragraph [ref=e220]:
          - text: The token is valid for six months. After this, you will need to create a new token. Once your token is generated, it must be provided as a header parameter under "Authorization" in every subsequent API call, with format
          - code [ref=e221]: "JWT {token}"
          - text: .
        - paragraph [ref=e222]:
          - strong [ref=e223]: "Related Operations:"
        - list [ref=e224]:
          - listitem [ref=e225]:
            - link "Authorization" [ref=e226] [cursor=pointer]:
              - /url: "#operation/authorization"
            - text: "- Get company context and user details"
          - listitem [ref=e227]:
            - link "Logout" [ref=e228] [cursor=pointer]:
              - /url: "#operation/logout"
            - text: "- Invalidate current token"
          - listitem [ref=e229]:
            - link "Get User Tokens" [ref=e230] [cursor=pointer]:
              - /url: "#operation/getUsersTokens"
            - text: "- List all active tokens"
