            - text: "- Subscribe to event notifications"
        - heading "10) How can I filter out response data for an API call?" [level=4] [ref=e353]
        - paragraph [ref=e354]:
          - text: Time Doctor API supports the filtering of data in some of the API calls. You can specify using the
          - code [ref=e355]: filter
          - text: keyword and provide multiple data points that you want to get in the response, i.e.,
          - code [ref=e356]: filter[name]
          - text: ","
          - code [ref=e357]: filter[email]
          - text: ", etc. You will see the filters query parameters in some of the API calls where you can use them."
        - paragraph [ref=e358]:
          - strong [ref=e359]: "Common Filtering Operations:"
