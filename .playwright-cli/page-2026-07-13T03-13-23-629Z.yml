        - text: Request/Response Format
      - list [ref=e246]:
        - listitem [ref=e247]:
          - text: Dates are returned in
          - link "ISO 8601 format" [ref=e248] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/ISO_8601
          - text: e.g.
          - code [ref=e249]: 2019-08-24T14:15:22Z
        - listitem [ref=e250]:
          - text: Time is returned in seconds and by default, it is in the
          - link "UTC timezone" [ref=e251] [cursor=pointer]:
